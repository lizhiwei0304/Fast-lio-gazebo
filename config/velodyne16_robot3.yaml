common:
    lid_topic:  "/robot_3/pointcloud"
    imu_topic:  "/robot_3/imu_data"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    
preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 16
    blind: 1

mapping:
    # acc_cov: 0.1
    # gyr_cov: 0.1
    # b_acc_cov: 0.009
    # b_gyr_cov: 0.002

    # S3E
    acc_cov: 0.012
    gyr_cov: 0.011
    b_acc_cov: 0.000005
    b_gyr_cov: 0.0000007
    fov_degree:    180
    det_range:     100.0
    # extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
    # extrinsic_T: [ 0.144414, -0.012514, 0.248438]
    # extrinsic_R:  [0.016500, -0.999854,  0.004485,
    #                0.999863,  0.016496, -0.001016,
    #                0.000942,  0.004501,  0.999989]
