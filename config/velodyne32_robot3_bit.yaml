common:
    lid_topic:  "/robot_3/pointcloud"
    imu_topic:  "/robot_3/imu_data"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    
preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 32
    blind: 1

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.01
    b_gyr_cov: 0.01
    fov_degree:    180
    det_range:     100.0
    extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
    extrinsic_T: [ 0, 0, 0.00]
    extrinsic_R: [ 1, 0, 0, 
                   0, 1, 0, 
                   0, 0, 1]    
    
    # extrinsic_T: [ 0.017740, 0.300000, 0.750000]
    # extrinsic_R: [ 0.999995, 0.002823, -0.001588, 
    #                -0.002827, 0.999993, -0.002424, 
    #                0.001581, 0.002429, 0.999996]

    # extrinsic_T: [ -0.294855297745553, -0.143908032604962, 0.400742904774982]
    # extrinsic_R: [ 0.014612958356250, -0.999953861767652, -0.003153622052322, 
    #                0.999571842945952, 0.014569984804196, 0.022861144696414, 
    #                -0.022964584423579, -0.003590098982779, 0.999775095405827]

    # extrinsic_T: [ 0.027740, 0.211637, 0.341768]
    # extrinsic_R: [ 0.999995, 0.002823, -0.001588, 
    #                -0.002827, 0.999993, -0.002424, 
    #                0.001581, 0.002429, 0.999996]



publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: false
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
